tasks:
    - id: define-diagnostics-contract
      status: done
      notes: 'Added docs/contracts/diagnostics.md with debug layout, manifest schema, tmux and exec required artifacts, caller obligations, and bounded capture sizes. Open questions: validate the 64KiB/256KiB/1MiB budgets on real failures; prompts and output tails can contain PII, so future work should decide whether redaction/configurable capture is needed beyond env redaction.'
    - id: fix-git-commit-output-volume
      status: done
      notes: 'CommitIfNeeded now uses git commit -q and transient staging excludes all .vibedrive plus root/nested target, node_modules, and __pycache__ paths for tracked and untracked changes. Tradeoff: legitimate project files under .vibedrive are no longer auto-committed; a future task could add an explicit allowlist/config opt-in.'
    - id: agent-transport-config-contract
      status: done
      notes: 'Config now accepts claude transport tui|print and codex transport tui|exec; scaffold keeps tui defaults and documents future non-interactive defaults: coder execute/address/checkpoint steps via codex exec, reviewer peer-review/checkpoint steps via claude print, finalize stays exec. New transports remain client implementation follow-ups.'
    - id: implement-diagnostics-package
      status: done
      notes: 'Implemented internal/diagnostics with atomic captures, contract size bounds, path-safe identity segments, manifest entries for written/unavailable/not-applicable artifacts, and same-step concurrency locking. Contract gap noted: manifest is listed as an artifact, so the package computes a stable manifest self-entry size.'
    - id: pin-agent-cli-versions
      status: done
      notes: 'Addressed review: moved version enforcement from config.Load to runner.New so read-only config consumers can inspect pins; added tests for loader purity, claude/codex mismatches, unreadable commands, and runner startup enforcement. Edited internal/runner outside owns_paths because startup enforcement belongs there. Intentional upgrades: update the CLI, run <cli> --version, manually bump vibedrive.yaml, then rerun verification.'
    - id: bound-runner-exec-output
      status: done
      notes: 'Exec steps now use diagnostics TailBuffer for stdout, stderr, and combined output, and capture exec diagnostics on command failure without changing the returned error format. Followup: future tmux/agent diagnostics should reuse the runner parent stdout/stderr tail capture instead of introducing separate parent-output buffers.'
    - id: wire-tmux-diagnostics
      status: done
      notes: Structured tmux diagnostics are wired for startup timeout, submit timeout, and unexpected exit; runner passes run/task/step identity plus parent tails; go test ./internal/runner -run Tmux and go test ./internal/runner pass.
    - id: codex-screen-detector-test-harness
      status: done
      notes: 'Peer review requested changes were addressed. Codex ReadyScreen/ScreenState now live canonically in pkg/agentcli/codex and internal/runner delegates to them; this is a narrow edit outside owns_paths so the package golden tests protect the runtime tmux detector. Busy-title and working-screen fixtures now use distinct screen evidence, and the CLI usage-error ambiguous fixture was replaced with a TUI-style stuck/no-submit fixture reconstructed from the prior failure notes because no diagnostics bundle was present. Remaining evidence: current heuristics still classify model-dialog panes as ready when the startup card remains visible and idle-looking status titles as idle even for stuck submit states; preserved for follow-up behavior fixes.'
    - id: claude-screen-detector-test-harness
      status: done
      notes: Added Claude Code 2.1.132 tmux-capture fixtures for idle title, busy title, trust prompt, and ambiguous/stuck error states, plus golden tests for classifyClaudeTmuxTitle and trust prompt detection. Real fixtures show the current title detector treats any non-empty non-idle title, including trust/error titles like cosmic, as busy; recorded unchanged for a future detector fix.
    - id: implement-claude-print-transport
      status: done
      notes: Implemented claude.transport=print as claude --print with prompt on stdin, streamed stdout/stderr, exec-style diagnostics with prompt artifacts on failure, and RunInteractivePrompt rejection for TUI-only flows. Narrow runner edits outside claude-cli were required to pass run/task/step diagnostics identity and render SessionID empty for non-TUI Claude, matching the transport contract. Print ignores session_strategy today; next iteration should evaluate Claude --print continuation/session flags if session reuse is needed.
    - id: fail-fast-on-unknown-tui-state
      status: done
      notes: Addressed review by adding Claude fixture-backed retry and fail-fast coverage, removing the package-global retry-interval test seam, and normalizing diagnostics state sources. The stricter policy will surface stale or ambiguous agent UI states, including panes whose title or screen no longer proves input is accepted.
    - id: implement-codex-exec-transport
      status: done
      notes: Implemented codex.transport=exec via `codex exec` with stdin prompt delivery, stdout/stderr streaming, and codex_exec diagnostics on failures. Added codex tests for happy path, non-zero diagnostics, prompt delivery, and interactive rejection, plus narrow runner edits outside owns_paths so rendered codex exec steps get diagnostics identity and parallel workers only use tmux for fullscreen agents. Local `codex exec --help` shows `exec resume`; next iteration can evaluate session continuity support.
    - id: integration-checkpoint-quality-recovery
      status: done
      notes: 'Added runner e2e checkpoint harness outside undeclared owns_paths for automated evidence. Rust/non-Rust fresh checkouts pass with codex exec/claude print; intentional finalize failures produce contract-shaped diagnostics; transient artifact excludes are exercised beyond .gitignore. Follow-ups remain in TUI/session paths not covered by the integration run: Codex/Claude detector edge cases, claude print session_strategy, and codex exec continuity.'
