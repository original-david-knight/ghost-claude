tasks:
    - id: schema-component-contract-metadata
      status: done
      notes: Added project.components plus task boundary metadata with validation that preserves serial readiness. The example plan needed quoted colon-containing commit messages to load in tests; keep that fix if regenerating from scratch.
    - id: boundary-aware-plan-prompts
      status: done
      notes: Init/restart prompts now require component, ownership, contract, context-reduction, and integration-boundary planning. Scaffold prompts surface owns_paths and contract metadata as edit authority. go test ./... passes.
    - id: plan-parallel-readiness-analysis
      status: done
      notes: Added deterministic plan-level ready-batch analysis plus CLI inspection. Missing task owns_paths/component ownership forces serial fallback; component owned_paths can supply ownership. Verified go test ./internal/plan ./cmd/vibedrive and go test ./... pass.
    - id: parallel-runner-isolation-design
      status: done
      notes: Added opt-in parallel config and isolated workspace/artifact path scaffolding while runner execution remains serial. Future reruns should build concurrent orchestration on taskExecutionPaths and implement merge/finalize before enabling parallel agents.
    - id: parallel-batch-execution
      status: done
      notes: Implemented isolated parallel ready-batch execution with per-task workspaces/artifacts, worker failure reporting, serial fallback for unsafe batches, and tests. Merge/finalize remains the next integration phase.
    - id: parallel-merge-and-finalize
      status: done
      notes: Parallel worker outputs now integrate through root-side patch apply and finalize in plan order. Fresh reruns should keep worker artifacts isolated and let root verification decide done status per task.
    - id: docs-and-examples-parallel-boundaries
      status: done
      notes: Documented boundary-first planning, ready-batch inspection, and opt-in parallel config. Scaffold defaults now explicitly keep serial execution; go test ./... passed.
    - id: parallel-boundary-checkpoint
      status: done
      notes: Full uncached go test -count=1 ./... passed. No regressions found; serial defaults remain opt-in-safe, and boundary analysis/parallel execution/docs are covered. Fresh reruns should keep artifact_root/worktree_root docs, examples, scaffold, and config tests aligned.
