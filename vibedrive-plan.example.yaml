project:
  name: example-project
  objective: Ship the project end-to-end in this repository.
  source_docs:
    - DESIGN.md
    - TEST_PLAN.md
  constraint_files:
    - DESIGN.md
  components:
    - id: contracts
      name: Shared contracts and integration boundaries
      owned_paths:
        - internal/contracts/**
      provides_contracts:
        - internal/contracts/public-api.md
    - id: service
      name: Service implementation
      owned_paths:
        - internal/service/**
      reads_contracts:
        - internal/contracts/public-api.md
      provides_contracts:
        - internal/service/service.go
    - id: web
      name: Web client
      owned_paths:
        - web/**
      reads_contracts:
        - internal/contracts/public-api.md
    - id: integration
      name: Integrated verification
      owned_paths:
        - internal/**
        - web/**
      reads_contracts:
        - internal/contracts/public-api.md

tasks:
  - id: define-public-contract
    title: Define the public contract shared by service and web work
    workflow: implement
    status: todo
    component: contracts
    owns_paths:
      - internal/contracts/**
    provides_contracts:
      - internal/contracts/public-api.md
    details: >-
      Establish the contract file before implementation tasks begin so later
      agents can work from a narrow, stable interface instead of rereading the
      whole repository.
    acceptance:
      - The contract file names the request, response, and error behavior needed by the service and web components.
      - The contract is specific enough for downstream tasks to implement against it without extra product context.
      - Leave task notes describing what was learned in this phase and what should change if the plan is rerun from a fresh environment.
    verify_commands:
      - test -f internal/contracts/public-api.md
    commit_message: "docs: define public integration contract"

  - id: implement-service-contract
    title: Implement the service side of the public contract
    workflow: implement
    status: todo
    deps:
      - define-public-contract
    component: service
    owns_paths:
      - internal/service/**
    reads_contracts:
      - internal/contracts/public-api.md
    provides_contracts:
      - internal/service/service.go
    details: >-
      Implement only the service-owned paths against the public contract. Do
      not change web-owned files in this task.
    acceptance:
      - Service behavior matches internal/contracts/public-api.md.
      - Service tests cover the contract-level success and error cases.
      - Leave task notes describing what was learned in this phase and what should change if the plan is rerun from a fresh environment.
    verify_commands:
      - go test ./internal/service/...
    commit_message: "feat: implement service contract"

  - id: implement-web-contract
    title: Implement the web client side of the public contract
    workflow: implement
    status: todo
    deps:
      - define-public-contract
    component: web
    owns_paths:
      - web/**
    reads_contracts:
      - internal/contracts/public-api.md
    details: >-
      Implement only the web-owned paths against the public contract. This task
      is parallel-ready with implement-service-contract because the tasks write
      disjoint owned paths and only read the shared contract.
    acceptance:
      - Web behavior matches internal/contracts/public-api.md.
      - Web verification covers loading, success, and contract-level error states.
      - Leave task notes describing what was learned in this phase and what should change if the plan is rerun from a fresh environment.
    verify_commands:
      - npm test --prefix web
    commit_message: "feat: implement web contract"

  - id: integration-checkpoint
    title: Run the service and web integration checkpoint
    workflow: checkpoint
    status: todo
    deps:
      - implement-service-contract
      - implement-web-contract
    component: integration
    owns_paths:
      - internal/**
      - web/**
    reads_contracts:
      - internal/contracts/public-api.md
    conflicts_with:
      - implement-service-contract
      - implement-web-contract
    acceptance:
      - Full service and web integration verification is complete after both component implementations are integrated.
      - Any integration regression is fixed or captured in task notes for a fresh replan.
      - Leave task notes describing what was learned in this phase and what should change if the plan is rerun from a fresh environment.
    verify_commands:
      - go test ./...
      - npm test --prefix web
    commit_message: "chore: verify service and web integration"
